<!DOCTYPE html>
{% extends 'dashboard.html' %}
{% block content %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <form method="post" action="{% url 'update_department' department_id=data.id %}" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="container-fluid pt-4 px-4">
                <div class="row g-4" >
                    <div class="col-sm-12 col-xl-12">
                        <div class="bg-secondary rounded h-100 p-4">
                            <h6 class="mb-4">Floating Label</h6>
                            <h6>Department Name</h6>
                             <div class="form-floating mb-3">
                                <select class="form-control" id="floatingInput" name="Department_Name">
                                    <option>{{ data.Department_Name }}</option>
                                       {% for i in department %}
                                         <option>{{ i.Department_Name }}</option>
                                       {% endfor %}
                                </select>
                                 <label for="floatingInput">Department</label>
                            </div>
                            <h6>Description</h6>
                            <div class="form-floating mb-3" >
                                <textarea class="form-control" placeholder="Description" id="floatingTextarea" style="height: 150px;" name="Department_Description">{{ data.Department_Description }}</textarea>
                                <label for="floatingTextarea">Description</label>
                            </div>
                            <h6>Department Image</h6>
                            <div class="mb-3">
                                <img src="{{ data.Department_Image.url }}" width="100px" height="100px">
                                <input class="form-control bg-dark" type="file" id="formFile" placeholder="Department Image" name="Department_Image">
                            </div>
                                <button type="submit" class="btn btn-primary">Submit</button>
                        </div>
                    </div>
                </div>
            </div>
    </form>
</body>
</html>
{% endblock %}
